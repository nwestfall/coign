<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coign — CMS Embed Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
    .cms-toolbar { background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    .cms-toolbar button { padding: 0.4rem 0.75rem; border: none; background: #6366f1; color: #fff; border-radius: 0.25rem; cursor: pointer; }
    #coign-container { border: 2px dashed #cbd5e1; min-height: 400px; border-radius: 0.5rem; padding: 1rem; }
  </style>
</head>
<body>
  <h1>CMS Embed Example</h1>
  <p>This example shows how a CMS admin might embed Coign inline inside a designated container instead of the default floating bubble.</p>

  <div class="cms-toolbar">
    <span>CMS Preview</span>
    <button onclick="mountCoign()">Mount Coign</button>
    <button onclick="unmountCoign()">Unmount</button>
  </div>

  <div id="coign-container">
    <p>Coign widget will appear here when mounted.</p>
  </div>

  <script src="../../dist/coign-sdk.iife.js"></script>
  <script>
    async function mountCoign() {
      await Coign.init({ preset: 'coign-balanced' });
      Coign.mount('#coign-container');
      Coign.open();
    }
    async function unmountCoign() {
      Coign.unmount();
    }
  </script>
</body>
</html>
