<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coign Widget UI Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; }
    .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Widget UI Test</h1>
  <p>This page tests the Coign widget without loading WebLLM.</p>

  <div class="controls">
    <button onclick="Coign.init({model:'coign-tiny',prompt:'test',preloadMode:'none'})">Init</button>
    <button onclick="Coign.show()">Show</button>
    <button onclick="Coign.hide()">Hide</button>
    <button onclick="Coign.open()">Open</button>
    <button onclick="Coign.close()">Close</button>
    <button onclick="Coign.mount('#inline-host')">Mount Inline</button>
    <button onclick="Coign.unmount()">Unmount</button>
    <button onclick="Coign.destroy()">Destroy</button>
  </div>

  <div id="inline-host" style="border: 2px dashed #cbd5e1; min-height: 400px; border-radius: 0.5rem; padding: 1rem;">
    <p>Inline host container</p>
  </div>

  <script src="../dist/coign-sdk.iife.js"></script>
</body>
</html>
